<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Produtos - TI2</title>
</head>
<body>
    <h1>Inserir Produto</h1>
    <form action="/produto/inserir" method="POST">
        <label>Nome:</label><br>
        <input type="text" name="nome_produto" required placeholder="Ex: Mouse"><br><br>
        
        <label>Preço:</label><br>
        <input type="number" step="0.01" name="preco_produto" required placeholder="19.90"><br><br>
        
        <button type="submit">Cadastrar</button>
    </form>
    <hr>
    <a href="/produto/listar">Ver lista de produtos</a>
</body>
</html>
