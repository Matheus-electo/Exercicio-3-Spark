<!DOCTYPE html>
<html lang="pt-br">
<head><meta charset="UTF-8"><title>Cadastro de Produtos</title></head>
<body>
    <h1>Inserir Novo Produto</h1>
    <form action="/produto/inserir" method="POST">
        Nome: <input type="text" name="nome_produto" required><br>
        Preço: <input type="number" step="0.01" name="preco_produto" required><br>
        <button type="submit">Cadastrar</button>
    </form>
</body>
</html>
